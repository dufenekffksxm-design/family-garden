    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(165deg, #f0f7ec 0%, #e8f5e9 30%, #fff8e1 100%);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 80px;
      position: relative;
    }

    /* ── Login Screen ── */
    .login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 24px; text-align: center;
    }
    .login-screen .logo { font-size: 72px; margin-bottom: 16px; }
    .login-screen h1 { font-size: 28px; font-weight: 900; color: #2e7d32; margin-bottom: 8px; }
    .login-screen p { font-size: 14px; color: #888; margin-bottom: 32px; }
    .login-screen input {
      width: 100%; max-width: 280px; padding: 14px 18px; border-radius: 14px;
      border: 2px solid #c8e6c9; font-size: 16px; text-align: center;
      outline: none; transition: border-color 0.2s;
    }
    .login-screen input:focus { border-color: #43a047; }
    .login-screen button {
      margin-top: 16px; width: 100%; max-width: 280px; padding: 14px;
      background: linear-gradient(135deg, #2e7d32, #43a047); color: white;
      border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: transform 0.15s;
    }
    .login-screen button:active { transform: scale(0.97); }
    .login-error { color: #c62828; font-size: 13px; margin-top: 12px; }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #2e7d32 0%, #388e3c 50%, #43a047 100%);
      padding: 28px 24px 20px; color: white;
      border-radius: 0 0 28px 28px;
      box-shadow: 0 4px 20px rgba(46,125,50,0.3);
    }
    .header-date { font-size: 13px; opacity: 0.85; margin-bottom: 4px; }
    .header-title { font-size: 26px; font-weight: 900; letter-spacing: -1px; }
    .header-sub { font-size: 13px; opacity: 0.8; margin-top: 4px; display: flex; justify-content: space-between; align-items: center; }
    .sync-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.2); border-radius: 12px;
      padding: 2px 10px; font-size: 11px;
    }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #76ff03; }
    .sync-dot.offline { background: #ff5252; }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
      display: flex; justify-content: space-around;
      padding: 8px 0 max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid #e0e0e0; z-index: 100;
    }
    .nav-btn {
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      transition: all 0.2s; opacity: 0.5;
    }
    .nav-btn.active { opacity: 1; transform: scale(1.1); }
    .nav-btn .icon { font-size: 22px; }
    .nav-btn .label { font-size: 11px; color: #666; }
    .nav-btn.active .label { color: #2e7d32; font-weight: 700; }

    /* ── Content ── */
    .content { padding: 16px 16px 0; }

    /* ── Alert Banner ── */
    .alert-banner {
      background: linear-gradient(135deg, #fff3e0, #ffe0b2);
      border-radius: 16px; padding: 14px 18px; margin-bottom: 16px;
      border: 1px solid #ffcc80;
    }
    .alert-title { font-size: 14px; font-weight: 700; color: #e65100; margin-bottom: 4px; }
    .alert-body { font-size: 13px; color: #bf360c; }

    /* ── Plant Card ── */
    .plant-card {
      background: white; border-radius: 16px; padding: 16px 18px;
      cursor: pointer; transition: all 0.2s; margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .plant-card.selected { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .plant-card-row { display: flex; align-items: center; gap: 12px; }
    .plant-icon {
      width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 26px;

    .plant-info { flex: 1; }
    .plant-name { font-size: 16px; font-weight: 700; color: #333; }

    .plant-badge {

    }
    .plant-last-water { font-size: 12px; color: #999; margin-top: 8px; padding-left: 60px; }

    /* ── Plant Detail ── */

      border: none; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer;

    .cal-day-events { display: flex; gap: 2px; margin-top: 2px; font-size: 8px; }

    .cal-detail {
      background: white; border-radius: 16px; padding: 16px;
      margin-top: 12px; border: 1px solid #e0e0e0;
    }
    .cal-detail-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
    .cal-event-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .cal-event-row:last-child { border-bottom: none; }
    .cal-event-badge {
      font-size: 11px; padding: 3px 8px; border-radius: 8px;
    }
    .cal-water-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .cal-water-btn {
      padding: 6px 10px; border-radius: 8px; font-size: 12px; cursor: pointer;

    .cal-water-btn.checked { border: 2px solid #1565c0; background: #e3f2fd; }
    .cal-legend { display: flex; gap: 16px; justify-content: center; margin-top: 16px; font-size: 12px; color: #888; }

    /* ── Guide ── */
    .guide-sub { font-size: 13px; color: #888; margin-bottom: 16px; }
    .guide-item { margin-bottom: 8px; }
    .guide-header {
      background: white; border-radius: 14px; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px; cursor: pointer;
      border: 1px solid #eee; transition: all 0.2s;

    .guide-body {
      background: #fafafa; border-radius: 0 0 14px 14px; padding: 16px;
      border: 1px solid #eee; border-top: none; font-size: 13px; color: #555; line-height: 2;
    }
    .season-tag {
      display: inline-block; padding: 2px 8px; border-radius: 6px; margin: 2px 3px; font-size: 11px;
      background: #f5f5f5; border: 1px solid #e0e0e0;
    }
    .season-tag.current { background: #e8f5e9; font-weight: 700; border-color: #81c784; }
    .guide-tip {
      margin-top: 8px; padding: 10px 12px; background: #fff8e1;
      border-radius: 10px; border: 1px solid #ffe082;
    }

    /* ── Empty State ── */
    .empty-state { text-align: center; padding: 60px 20px; color: #888; }
    .empty-icon { font-size: 64px; margin-bottom: 16px; }
    .empty-title { font-size: 18px; font-weight: 700; color: #555; margin-bottom: 8px; }
    .empty-desc { font-size: 14px; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 60px 20px; color: #888; }
    .spinner {
      display: inline-block; width: 36px; height: 36px;
      border: 3px solid #e0e0e0; border-top-color: #43a047;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

    const SEASONS = {
      spring: { label: "봄", months: [3, 4, 5] },
      summer: { label: "여름", months: [6, 7, 8] },
      fall: { label: "가을", months: [9, 10, 11] },
      winter: { label: "겨울", months: [12, 1, 2] },
    };

    function getSeason(month) {
      for (const [key, val] of Object.entries(SEASONS)) {
        if (val.months.includes(month)) return key;
      }
      return 'spring';
    }

    function formatDate(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function parseDate(s) {
      const [y,m,d] = s.split('-').map(Number);
      return new Date(y, m-1, d);
    }

    function daysBetween(a, b) {
      return Math.round((b - a) / (1000*60*60*24));
    }

      try {
        const { data: plants, error: pe } = await supabase
          .from('plants').select('*').order('created_at', { ascending: true });
        if (pe) throw pe;

        const { data: logs, error: le } = await supabase
          .from('water_logs').select('*').order('watered_date', { ascending: true });
        if (le) throw le;

        app.plants = (plants || []).map(p => ({
          id: p.id, name: p.name, nickname: p.nickname || '', addedDate: p.added_date
        }));

        app.waterLogs = {};
        (logs || []).forEach(l => {
          if (!app.waterLogs[l.plant_id]) app.waterLogs[l.plant_id] = [];
          app.waterLogs[l.plant_id].push(l.watered_date);
        });
      } catch (e) {
        console.error('Load error:', e);
      }

      app.loading = false;
      render();
    }

    async function addPlant(name, nickname) {
      const { data, error } = await supabase
        .from('plants').insert({ name, nickname: nickname || '' }).select().single();
      if (error) { console.error(error); return; }
      app.plants.push({ id: data.id, name: data.name, nickname: data.nickname, addedDate: data.added_date });
      render();
    }

    async function removePlant(id) {
      const { error } = await supabase.from('plants').delete().eq('id', id);
      if (error) { console.error(error); return; }
      app.plants = app.plants.filter(p => p.id !== id);
      delete app.waterLogs[id];
      app.selectedPlant = null;
      render();
    }

    async function waterPlant(plantId, date) {
      const { error } = await supabase
        .from('water_logs').upsert({ plant_id: plantId, watered_date: date }, { onConflict: 'plant_id,watered_date' });
      if (error) { console.error(error); return; }
      if (!app.waterLogs[plantId]) app.waterLogs[plantId] = [];
      if (!app.waterLogs[plantId].includes(date)) {
        app.waterLogs[plantId].push(date);
        app.waterLogs[plantId].sort();
      }
      render();
    }

    async function unwaterPlant(plantId, date) {
      const { error } = await supabase
        .from('water_logs').delete().eq('plant_id', plantId).eq('watered_date', date);
      if (error) { console.error(error); return; }
      if (app.waterLogs[plantId]) {
        app.waterLogs[plantId] = app.waterLogs[plantId].filter(d => d !== date);
      }
      render();
    }

    // ══════════════════════════════════════════
    // 🌱 Realtime Subscriptions
    // ══════════════════════════════════════════
    function setupRealtime() {
      supabase.channel('plants-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'plants' }, () => loadData())
        .on('postgres_changes', { event: '*', schema: 'public', table: 'water_logs' }, () => loadData())
        .subscribe((status) => {
          app.online = status === 'SUBSCRIBED';
          render();
        });
    }

    // ══════════════════════════════════════════
    // 🌱 Render
    // ══════════════════════════════════════════
    function render() {
      const el = document.getElementById('app');

      if (!app.loggedIn) {
        el.innerHTML = renderLogin();
        return;
      }

      if (app.loading) {
        el.innerHTML = `
          <div class="header">
            <div class="header-date">${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 · ${SEASONS[currentSeason].label}</div>
            <div class="header-title">🌱 우리 가족 정원</div>
          </div>
          <div class="loading"><div class="spinner"></div><div>불러오는 중...</div></div>
        `;
        return;
      }

      let content = '';
      switch (app.activeTab) {
        case 'home': content = renderHome(); break;
        case 'add': content = renderAdd(); break;
        case 'calendar': content = renderCalendar(); break;
        case 'guide': content = renderGuide(); break;
      }

      el.innerHTML = `
        <div class="header">
          <div class="header-date">${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 · ${SEASONS[currentSeason].label}</div>
          <div class="header-title">🌱 우리 가족 정원</div>
          <div class="header-sub">
            <span>식물 ${app.plants.length}그루 관리 중</span>
            <span class="sync-badge"><span class="sync-dot ${app.online ? '' : 'offline'}"></span>${app.online ? '실시간 동기화' : '오프라인'}</span>
          </div>
        </div>
        <div class="content">${content}</div>
        <div class="bottom-nav">
          ${['home','add','calendar','guide'].map(id => {
            const icons = { home: '🏡', add: '➕', calendar: '📅', guide: '📖' };
            const labels = { home: '내 정원', add: '추가', calendar: '캘린더', guide: '식물도감' };
            return `<button class="nav-btn ${app.activeTab === id ? 'active' : ''}" onclick="switchTab('${id}')">
              <span class="icon">${icons[id]}</span><span class="label">${labels[id]}</span>
            </button>`;
          }).join('')}
        </div>
      `;
    }

    function switchTab(id) {
      app.activeTab = id;
      app.selectedPlant = null;
      app.selectedDay = null;
      app.addSelected = null;
      app.addNickname = '';
      app.addSearch = '';
      render();
    }

    // ── Login ──
    function renderLogin() {
      return `
        <div class="login-screen">
          <div class="logo">🌱</div>
          <h1>우리 가족 정원</h1>
          <p>가족 비밀번호를 입력하세요</p>
          <input type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()" />
          <button onclick="doLogin()">입장하기</button>
          <div id="login-error" class="login-error"></div>
        </div>
      `;
    }

    function doLogin() {
      const pw = document.getElementById('pw-input').value;
      if (pw === FAMILY_PASSWORD) {
        app.loggedIn = true;
        sessionStorage.setItem('garden_auth', 'true');
        loadData();
        setupRealtime();
      } else {
        document.getElementById('login-error').textContent = '비밀번호가 틀렸어요 🥲';
      }
    }

    // ── Home ──
    function getWaterStatus(plant) {
      const db = PLANT_DB[plant.name];
      if (!db) return { status: 'unknown', daysLeft: 0 };
      const interval = db.waterInterval[currentSeason];
      const logs = app.waterLogs[plant.id] || [];
      if (logs.length === 0) return { status: 'need', daysLeft: 0 };
      const lastWater = parseDate(logs[logs.length - 1]);
      const diff = daysBetween(lastWater, today);
      const daysLeft = interval - diff;
      if (daysLeft <= 0) return { status: 'need', daysLeft: 0 };
      if (daysLeft <= 1) return { status: 'soon', daysLeft };
      return { status: 'ok', daysLeft };
    }

    function renderHome() {
      if (app.plants.length === 0) {
        return `<div class="empty-state">
          <div class="empty-icon">🌱</div>
          <div class="empty-title">아직 식물이 없어요</div>
          <div class="empty-desc">아래 [추가] 탭에서 식물을 등록해보세요!</div>
        </div>`;
      }

      const sorted = [...app.plants].sort((a, b) => {
        const order = { need: 0, soon: 1, ok: 2, unknown: 3 };
        return (order[getWaterStatus(a).status] ?? 3) - (order[getWaterStatus(b).status] ?? 3);
      });

      const needWater = sorted.filter(p => getWaterStatus(p).status === 'need');

      let html = '';
      if (needWater.length > 0) {
        html += `<div class="alert-banner">
          <div class="alert-title">💧 물 줄 시간이에요!</div>
          <div class="alert-body">${needWater.map(p => {
            const db = PLANT_DB[p.name];
            return `${db?.emoji || '🌱'} ${p.nickname || p.name}`;
          }).join(', ')}</div>
        </div>`;
      }

      sorted.forEach(plant => {
        const db = PLANT_DB[plant.name];
        const ws = getWaterStatus(plant);
        const isSelected = app.selectedPlant === plant.id;
        const logs = app.waterLogs[plant.id] || [];
        const lastWatered = logs.length > 0 ? logs[logs.length - 1] : null;

        const cfg = {
          need: { bg: '#ffebee', border: '#ef9a9a', badge: '🔴 물 주세요!', badgeColor: '#c62828' },
          soon: { bg: '#fff8e1', border: '#ffe082', badge: '🟡 내일 물 주기', badgeColor: '#f57f17' },
          ok:   { bg: '#e8f5e9', border: '#a5d6a7', badge: `🟢 ${ws.daysLeft}일 후`, badgeColor: '#2e7d32' },
          unknown: { bg: '#f5f5f5', border: '#e0e0e0', badge: '❓ 정보 없음', badgeColor: '#757575' },
        };
        const sc = cfg[ws.status];

        html += `<div class="plant-card ${isSelected ? 'selected' : ''}" style="border: 2px solid ${sc.border}" onclick="app.selectedPlant = app.selectedPlant === '${plant.id}' ? null : '${plant.id}'; render();">
          <div class="plant-card-row">
            <div class="plant-icon" style="background:${sc.bg}">${db?.emoji || '🌱'}</div>
            <div class="plant-info">
              <div class="plant-name">${plant.nickname || plant.name}</div>
              <div class="plant-sub">${plant.name} · ${db?.category || '식물'}</div>
            </div>
            <div class="plant-badge" style="color:${sc.badgeColor}; background:${sc.bg}">${sc.badge}</div>
          </div>
          ${lastWatered ? `<div class="plant-last-water">마지막 물 준 날: ${lastWatered}</div>` : ''}
        </div>`;

        if (isSelected && db) {
          html += `<div class="plant-detail" style="border-left:2px solid ${sc.border}; border-right:2px solid ${sc.border}; border-bottom:2px solid ${sc.border};">
            <div class="plant-detail-info">
              <div>☀️ 빛: ${db.light}</div>
              <div>🌡️ 적정 온도: ${db.tempRange}</div>
              <div>💧 물 주기(${SEASONS[currentSeason].label}): <b>${db.waterInterval[currentSeason]}일</b>마다</div>
              <div>🪴 흙 배합: ${db.soil}</div>
              <div>💡 ${db.tips}</div>
            </div>
            <div class="plant-actions">
              <button class="btn-water" onclick="event.stopPropagation(); waterPlant('${plant.id}', '${todayStr}')">💧 오늘 물 줬어요</button>
              <button class="btn-delete" onclick="event.stopPropagation(); if(confirm('${(plant.nickname || plant.name)}을(를) 삭제할까요?')) removePlant('${plant.id}')">🗑️</button>
            </div>
          </div>`;
        }
      });

      return html;
    }

    // ── Add ──
    function renderAdd() {
      const search = app.addSearch.toLowerCase();
      const filtered = Object.keys(PLANT_DB).filter(name =>
        name.toLowerCase().includes(search) || PLANT_DB[name].category.includes(search)
      );

      let html = `<div class="section-title">식물 추가하기</div>
        <input class="search-input" type="text" placeholder="🔍 식물 이름 검색..." value="${app.addSearch}" oninput="app.addSearch=this.value; render()" />
        <div class="plant-grid">`;

      filtered.forEach(name => {
        const db = PLANT_DB[name];
        const isSelected = app.addSelected === name;
        const alreadyAdded = app.plants.some(p => p.name === name);
        html += `<div class="plant-grid-item ${isSelected ? 'selected' : ''} ${alreadyAdded ? 'disabled' : ''}" onclick="${alreadyAdded ? '' : `app.addSelected='${name}'; render();`}">
          <div class="plant-grid-emoji">${db.emoji}</div>
          <div class="plant-grid-name">${name}</div>
          <div class="plant-grid-cat">${db.category}</div>
          ${alreadyAdded ? '<div style="font-size:10px; color:#999; margin-top:4px">등록됨 ✓</div>' : ''}
        </div>`;
      });

      html += '</div>';

      if (app.addSelected) {
        const db = PLANT_DB[app.addSelected];
        html += `<div class="add-form">
          <div style="font-size:15px; font-weight:700; margin-bottom:10px">${db.emoji} ${app.addSelected}</div>
          <input type="text" placeholder="별명 (예: 거실 토마토) - 선택사항" id="nickname-input" value="${app.addNickname}" oninput="app.addNickname=this.value" />
          <button class="btn-add" onclick="doAddPlant()">🌱 등록하기</button>
        </div>`;
      }

      return html;
    }

    async function doAddPlant() {
      if (!app.addSelected) return;
      await addPlant(app.addSelected, app.addNickname);
      app.addSelected = null;
      app.addNickname = '';
      app.activeTab = 'home';
      render();
    }

    // ── Calendar ──
    function renderCalendar() {
      const vd = app.calendarDate;
      const year = vd.getFullYear();
      const month = vd.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      let html = `<div class="cal-nav">
        <button onclick="app.calendarDate=new Date(${year},${month-1},1); app.selectedDay=null; render()">◀</button>
        <div class="cal-title">${year}년 ${month+1}월</div>
        <button onclick="app.calendarDate=new Date(${year},${month+1},1); app.selectedDay=null; render()">▶</button>
      </div>`;

      html += '<div class="cal-header">';
      ['일','월','화','수','목','금','토'].forEach((d, i) => {
        const color = i === 0 ? '#c62828' : i === 6 ? '#1565c0' : '#888';
        html += `<div style="color:${color}">${d}</div>`;
      });
      html += '</div><div class="cal-grid">';

      for (let i = 0; i < firstDay; i++) html += '<div></div>';

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = dateStr === todayStr;
        const isSelected = app.selectedDay === d;
        const events = getEventsForDay(year, month, d);
        const hasWatered = events.some(e => e.type === 'watered');
        const hasPredicted = events.some(e => e.type === 'predicted');
        const dow = (firstDay + d - 1) % 7;
        const dayColor = isToday ? 'white' : dow === 0 ? '#c62828' : dow === 6 ? '#1565c0' : '#333';

        let cls = 'cal-day';
        if (isToday) cls += ' today';
        else if (isSelected) cls += ' selected';

        html += `<div class="${cls}" onclick="app.selectedDay = app.selectedDay===${d} ? null : ${d}; render();">
          <span style="color:${isToday ? 'white' : dayColor}">${d}</span>
          <div class="cal-day-events">
            ${hasWatered ? '💧' : ''}${hasPredicted && !hasWatered ? '⏰' : ''}
          </div>
        </div>`;
      }
      html += '</div>';

      if (app.selectedDay) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(app.selectedDay).padStart(2,'0')}`;
        const events = getEventsForDay(year, month, app.selectedDay);

        html += `<div class="cal-detail">
          <div class="cal-detail-title">${month+1}월 ${app.selectedDay}일</div>`;

        if (events.length === 0) {
          html += '<div style="font-size:13px; color:#999">기록이 없어요</div>';
        } else {
          events.forEach(ev => {
            const db = PLANT_DB[ev.plant.name];
            const bgColor = ev.type === 'watered' ? '#e3f2fd' : '#fff3e0';
            const txtColor = ev.type === 'watered' ? '#1565c0' : '#e65100';
            const label = ev.type === 'watered' ? '💧 물 줌' : '⏰ 물 줄 예정';
            html += `<div class="cal-event-row">
              <span style="font-size:20px">${db?.emoji || '🌱'}</span>
              <span style="flex:1; font-size:13px">${ev.plant.nickname || ev.plant.name}</span>
              <span class="cal-event-badge" style="background:${bgColor}; color:${txtColor}">${label}</span>
            </div>`;
          });
        }

        if (app.plants.length > 0) {
          html += '<div style="margin-top:12px"><div style="font-size:12px; color:#888; margin-bottom:6px">물 주기 기록:</div><div class="cal-water-btns">';
          app.plants.forEach(plant => {
            const db = PLANT_DB[plant.name];
            const logs = app.waterLogs[plant.id] || [];
            const isWatered = logs.includes(dateStr);
            html += `<button class="cal-water-btn ${isWatered ? 'checked' : ''}" onclick="${isWatered ? `unwaterPlant('${plant.id}','${dateStr}')` : `waterPlant('${plant.id}','${dateStr}')`}">
              ${db?.emoji || '🌱'} ${plant.nickname || plant.name}${isWatered ? ' ✓' : ''}
            </button>`;
          });
          html += '</div></div>';
        }

        html += '</div>';
      }

      html += '<div class="cal-legend"><span>💧 물 준 날</span><span>⏰ 예정일</span></div>';
      return html;
    }

    function getEventsForDay(year, month, day) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dateObj = new Date(year, month, day);
      const events = [];

      app.plants.forEach(plant => {
        const logs = app.waterLogs[plant.id] || [];
        if (logs.includes(dateStr)) {
          events.push({ type: 'watered', plant });
        }
      });

      if (dateObj >= today) {
        app.plants.forEach(plant => {
          const db = PLANT_DB[plant.name];
          if (!db) return;
          const season = getSeason(month + 1);
          const interval = db.waterInterval[season];
          const logs = app.waterLogs[plant.id] || [];
          if (logs.length === 0) return;
          const lastWater = parseDate(logs[logs.length - 1]);
          const diff = daysBetween(lastWater, dateObj);
          if (diff > 0 && diff % interval === 0) {
            events.push({ type: 'predicted', plant });
          }
        });
      }
      return events;
    }

    // ── Guide ──
    function renderGuide() {
      let html = `<div class="section-title">식물 도감</div>
        <div class="guide-sub">현재 계절: ${SEASONS[currentSeason].label} 기준 관리법</div>`;

      Object.entries(PLANT_DB).forEach(([name, db]) => {
        const isOpen = app.guideSelected === name;
        html += `<div class="guide-item">
          <div class="guide-header ${isOpen ? 'open' : ''}" onclick="app.guideSelected = app.guideSelected==='${name}' ? null : '${name}'; render();">
            <span style="font-size:28px">${db.emoji}</span>
            <div style="flex:1">
              <div style="font-size:15px; font-weight:700">${name}</div>
              <div style="font-size:12px; color:#888">${db.category} · 난이도: ${db.difficulty}</div>
            </div>
            <span style="font-size:12px; color:#aaa">${isOpen ? '▲' : '▼'}</span>
          </div>`;

        if (isOpen) {
          html += `<div class="guide-body">
            <div>☀️ <b>빛</b>: ${db.light}</div>
            <div>🌡️ <b>적정 온도</b>: ${db.tempRange}</div>
            <div>💧 <b>물 주기</b>: ${Object.entries(SEASONS).map(([key, s]) =>
              `<span class="season-tag ${key === currentSeason ? 'current' : ''}">${s.label} ${db.waterInterval[key]}일</span>`
            ).join('')}</div>
            <div>💧 <b>물 주는 법</b>: ${db.waterNote}</div>
            <div>🪴 <b>흙 배합</b>: ${db.soil}</div>
            <div class="guide-tip">💡 <b>팁</b>: ${db.tips}</div>
          </div>`;
        }
        html += '</div>';
      });

      return html;
    }

    // ══════════════════════════════════════════
    // 🌱 Init
    // ══════════════════════════════════════════
    if (sessionStorage.getItem('garden_auth') === 'true') {
      app.loggedIn = true;
      loadData();
      setupRealtime();
    } else {
      render();
    }

    // ── Service Worker 등록 (캐시 방지) ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        // 업데이트 체크 - 페이지 열 때마다 확인
        reg.update();
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'activated') {
              window.location.reload();
            }
          });
        });
      }).catch(() => {});
    }
  </script>
</body>
</html>
