const SEASONS={spring:{label:"봄",months:[3,4,5]},summer:{label:"여름",months:[6,7,8]},fall:{label:"가을",months:[9,10,11]},winter:{label:"겨울",months:[12,1,2]}};
function gS(m){for(const[k,v]of Object.entries(SEASONS))if(v.months.includes(m))return k;return'spring';}
function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function prs(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function ddf(a,b){return Math.round((b-a)/864e5);}
const today=new Date();const todayStr=fmt(today);const season=gS(today.getMonth()+1);
const A={user:null,plants:[],wl:{},tab:'home',sel:null,sd:null,cd:new Date(today.getFullYear(),today.getMonth(),1),addSel:[],addNick:'',addQ:'',addEditing:null,addStage:3,gSel:null,loading:true,online:true,delMode:false,delSet:new Set()};

async function loadAll(){
  try{const[pd,wd]=await Promise.all([fetch(`${SUPA}/plants?select=*&order=created_at.asc`,{headers:H}).then(r=>r.json()),fetch(`${SUPA}/water_logs?select=*&order=watered_date.asc`,{headers:H}).then(r=>r.json())]);
  A.plants=(pd||[]).map(p=>({id:p.id,name:p.name,nick:p.nickname||'',added:p.added_date,stage:p.growth_stage||3}));
  A.wl={};(wd||[]).forEach(l=>{if(!A.wl[l.plant_id])A.wl[l.plant_id]=[];A.wl[l.plant_id].push({date:l.watered_date,by:l.watered_by||''});});
  A.online=true;}catch(e){A.online=false;}A.loading=false;render();}

function getLastW(pid){const logs=A.wl[pid]||[];if(!logs.length)return null;const sorted=[...logs].sort((a,b)=>a.date>b.date?1:-1);return sorted[sorted.length-1];}
function getWDates(pid){return[...new Set((A.wl[pid]||[]).map(l=>l.date))].sort();}
function getStatus(p){const db=DB[p.name];if(!db)return{s:'unknown',d:0};const iv=db.wi[season];const dates=getWDates(p.id);if(!dates.length)return{s:'need',d:0};const left=iv-ddf(prs(dates[dates.length-1]),today);if(left<=0)return{s:'need',d:0};if(left<=1)return{s:'soon',d:left};return{s:'ok',d:left};}
function sc(ws){return ws.s==='need'?{bg:'#ffebee',bd:'#ef9a9a',badge:'🔴 물 주세요!',bc:'#c62828'}:ws.s==='soon'?{bg:'#fff8e1',bd:'#ffe082',badge:'🟡 내일 물 주기',bc:'#f57f17'}:ws.s==='ok'?{bg:'#e8f5e9',bd:'#a5d6a7',badge:`🟢 ${ws.d}일 후`,bc:'#2e7d32'}:{bg:'#f5f5f5',bd:'#e0e0e0',badge:'❓',bc:'#757575'};}

function updateAddGrid(){const grid=document.getElementById('add-grid');if(!grid)return;const q=A.addQ.toLowerCase();const filtered=Object.keys(DB).filter(n=>n.toLowerCase().includes(q)||DB[n].cat.includes(q));let h='';filtered.forEach(name=>{const db=DB[name];const cnt=A.addSel.filter(s=>s.name===name).length;h+=`<div style="position:relative"><div onclick="A.addSel.push({name:'${name}',nick:'',stage:A.addStage});render()" style="background:${cnt>0?'linear-gradient(135deg,#e8f5e9,#c8e6c9)':'white'};border-radius:14px;padding:14px;border:${cnt>0?'2px solid #43a047':'2px solid #eee'};cursor:pointer;text-align:center"><div style="font-size:32px;margin-bottom:6px">${db.emoji}</div><div style="font-size:14px;font-weight:700;color:#333">${name}</div><div style="font-size:11px;color:#888;margin-top:2px">${db.cat}</div>${cnt>0?`<div style="font-size:10px;color:#2e7d32;margin-top:4px;font-weight:700">✓ ${cnt}개</div>`:''}</div><button onclick="event.stopPropagation();A.addEditing='${name}';A.addNick='';render();requestAnimationFrame(()=>{document.getElementById('nick-input')?.focus()})" style="position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:12px;background:rgba(46,125,50,0.1);border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:#2e7d32">+</button></div>`;});grid.innerHTML=h;}

function enterAs(name){A.user=name;A.loading=true;render();loadAll();setInterval(loadAll,5000);}
function switchTab(t){A.tab=t;A.sel=null;A.sd=null;A.addSel=[];A.addNick='';A.addQ='';A.addEditing=null;A.delMode=false;A.delSet=new Set();render();}
async function doAddMulti(){if(!A.addSel.length)return;for(const it of A.addSel){const r=await fetch(`${SUPA}/plants`,{method:'POST',headers:H,body:JSON.stringify({name:it.name,nickname:it.nick||'',growth_stage:it.stage||3})});const d=await r.json();if(d?.[0])A.plants.push({id:d[0].id,name:d[0].name,nick:d[0].nickname||'',added:d[0].added_date,stage:d[0].growth_stage||3});}A.addSel=[];A.tab='home';render();}
async function doRemove(id){if(!confirm('삭제할까요?'))return;await fetch(`${SUPA}/plants?id=eq.${id}`,{method:'DELETE',headers:H});A.plants=A.plants.filter(p=>p.id!==id);delete A.wl[id];A.sel=null;render();}
async function doRemoveMulti(){const ids=A.delSet;if(!ids.size||!confirm(`${ids.size}개 삭제?`))return;for(const id of ids)await fetch(`${SUPA}/plants?id=eq.${id}`,{method:'DELETE',headers:H});A.plants=A.plants.filter(p=>!ids.has(p.id));ids.forEach(id=>delete A.wl[id]);A.delMode=false;A.delSet=new Set();A.sel=null;render();}
async function doWater(pid,date){await fetch(`${SUPA}/water_logs`,{method:'POST',headers:{...H,Prefer:'return=representation,resolution=merge-duplicates'},body:JSON.stringify({plant_id:pid,watered_date:date,watered_by:A.user||''})});if(!A.wl[pid])A.wl[pid]=[];A.wl[pid].push({date,by:A.user||''});render();}
async function doUnwater(pid,date){await fetch(`${SUPA}/water_logs?plant_id=eq.${pid}&watered_date=eq.${date}&watered_by=eq.${A.user||''}`,{method:'DELETE',headers:H});if(A.wl[pid])A.wl[pid]=A.wl[pid].filter(l=>!(l.date===date&&l.by===(A.user||'')));render();}
async function doSetStage(pid,stage){await fetch(`${SUPA}/plants?id=eq.${pid}`,{method:'PATCH',headers:H,body:JSON.stringify({growth_stage:stage})});A.plants=A.plants.map(p=>p.id===pid?{...p,stage}:p);render();}

function render(){const el=document.getElementById('app');
if(!A.user){el.innerHTML=rFamily();return;}
if(A.loading){el.innerHTML=rHdr()+`<div style="text-align:center;padding:60px 20px;color:#888"><div class="spinner"></div><div>불러오는 중...</div></div>`;return;}
let c='';switch(A.tab){case'home':c=rHome();break;case'add':c=rAdd();break;case'calendar':c=rCal();break;case'guide':c=rGuide();break;}
el.innerHTML=rHdr()+`<div class="ct">${c}</div>`+rNav();}

function rFamily(){return`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center"><div style="font-size:72px;margin-bottom:16px">🌱</div><div style="font-size:26px;font-weight:900;color:#2e7d32;margin-bottom:8px">${APP}</div><div style="font-size:15px;color:#888;margin-bottom:32px">누구세요?</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:320px">${FAM.map(f=>`<button onclick="enterAs('${f.name}')" style="padding:16px 8px;background:white;border:2px solid #c8e6c9;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.05)"><span style="font-size:36px">${f.emoji}</span><span style="font-size:14px;font-weight:700;color:#333">${f.name}</span></button>`).join('')}</div></div>`;}

function rHdr(){const ue=FAM.find(f=>f.name===A.user)?.emoji||'👤';return`<div class="hdr"><div style="font-size:13px;opacity:.85">${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 · ${SEASONS[season].label}</div><div style="font-size:24px;font-weight:900;letter-spacing:-1px">🌱 ${APP}</div><div style="font-size:13px;opacity:.8;margin-top:4px;display:flex;justify-content:space-between;align-items:center"><span>식물 ${A.plants.length}그루</span><button onclick="A.user=null;render()" style="display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.2);border-radius:12px;padding:2px 10px;font-size:12px;border:none;color:white;cursor:pointer">${ue} ${A.user} ▾</button></div></div>`;}
function rNav(){const tabs=[{id:'home',ic:'🏡',l:'내 정원'},{id:'add',ic:'➕',l:'추가'},{id:'calendar',ic:'📅',l:'캘린더'},{id:'guide',ic:'📖',l:'식물도감'}];return`<div class="bnav">${tabs.map(t=>`<button class="nb ${A.tab===t.id?'on':''}" onclick="switchTab('${t.id}')"><span class="ic">${t.ic}</span><span class="lb">${t.l}</span></button>`).join('')}</div>`;}

function rHome(){
if(!A.plants.length)return`<div style="text-align:center;padding:60px 20px;color:#888"><div style="font-size:64px;margin-bottom:16px">🌱</div><div style="font-size:18px;font-weight:700;color:#555;margin-bottom:8px">아직 식물이 없어요</div><div style="font-size:14px">[추가] 탭에서 등록해보세요!</div></div>`;
const sorted=[...A.plants].sort((a,b)=>{const o={need:0,soon:1,ok:2,unknown:3};return(o[getStatus(a).s]??3)-(o[getStatus(b).s]??3);});const need=sorted.filter(p=>getStatus(p).s==='need');
let h=`<div style="display:flex;justify-content:flex-end;margin-bottom:12px;gap:8px">`;
if(A.delMode){h+=`<button onclick="A.delMode=false;A.delSet=new Set();render()" style="padding:8px 14px;background:#f5f5f5;border:1px solid #ddd;border-radius:10px;font-size:13px;cursor:pointer;color:#666">취소</button>`;if(A.delSet.size>0)h+=`<button onclick="doRemoveMulti()" style="padding:8px 14px;background:#ffebee;border:1px solid #ef9a9a;border-radius:10px;font-size:13px;cursor:pointer;color:#c62828;font-weight:700">🗑️ ${A.delSet.size}개 삭제</button>`;}
else h+=`<button onclick="A.delMode=true;render()" style="padding:8px 14px;background:#fff;border:1px solid #ddd;border-radius:10px;font-size:13px;cursor:pointer;color:#888">선택 삭제</button>`;h+=`</div>`;
if(!A.delMode&&need.length)h+=`<div style="background:linear-gradient(135deg,#fff3e0,#ffe0b2);border-radius:16px;padding:14px 18px;margin-bottom:16px;border:1px solid #ffcc80"><div style="font-size:14px;font-weight:700;color:#e65100;margin-bottom:4px">💧 물 줄 시간이에요!</div><div style="font-size:13px;color:#bf360c">${need.map(p=>`${DB[p.name]?.emoji||'🌱'} ${p.nick||p.name}`).join(', ')}</div></div>`;

sorted.forEach(p=>{const db=DB[p.name];const ws=getStatus(p);const c=sc(ws);const isSel=!A.delMode&&A.sel===p.id;const isChk=A.delSet.has(p.id);const ms=maxStg(p.name);const si=stTip(p.name,p.stage);const stIcon=STAGES.find(s=>s.id===p.stage)?.icon||'☘️';
const lw=getLastW(p.id);const lwLabel=lw?`${lw.by?((FAM.find(f=>f.name===lw.by)?.emoji||'')+' '+lw.by):'누군가'}이(가) ${lw.date}에 물 줌`:null;
const todayLogs=(A.wl[p.id]||[]).filter(l=>l.date===todayStr);const iWatered=todayLogs.some(l=>l.by===A.user);

h+=`<div style="margin-bottom:12px"><div onclick="${A.delMode?`(function(){const s=A.delSet;if(s.has('${p.id}'))s.delete('${p.id}');else s.add('${p.id}');render();})()`:`A.sel=A.sel==='${p.id}'?null:'${p.id}';render();`}" style="background:${A.delMode&&isChk?'#ffebee':'white'};border-radius:16px;padding:16px 18px;border:2px solid ${A.delMode&&isChk?'#ef9a9a':c.bd};cursor:pointer;box-shadow:${isSel?'0 4px 16px rgba(0,0,0,.1)':'0 2px 8px rgba(0,0,0,.05)'}"><div style="display:flex;align-items:center;gap:12px">`;
if(A.delMode)h+=`<div style="width:24px;height:24px;border-radius:8px;border:2px solid ${isChk?'#c62828':'#ccc'};background:${isChk?'#c62828':'white'};display:flex;align-items:center;justify-content:center;font-size:14px;color:white;flex-shrink:0">${isChk?'✓':''}</div>`;
h+=`<div style="width:48px;height:48px;border-radius:14px;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:26px">${db?.emoji||'🌱'}</div><div style="flex:1"><div style="font-size:16px;font-weight:700;color:#333">${p.nick||p.name}</div><div style="font-size:12px;color:#888;margin-top:2px">${p.name} · ${stIcon} ${STAGES.find(s=>s.id===p.stage)?.name||'성장'}</div></div>`;
if(!A.delMode)h+=`<div style="font-size:12px;font-weight:600;color:${c.bc};background:${c.bg};border-radius:20px;padding:4px 10px">${c.badge}</div>`;
h+=`</div>`;
if(!A.delMode){h+=`<div style="margin-top:10px;padding-left:60px"><div style="display:flex;gap:4px;align-items:center">`;for(let i=0;i<ms;i++)h+=`<div style="flex:1;height:4px;border-radius:2px;background:${i+1<=p.stage?'#43a047':'#e0e0e0'}"></div>`;h+=`<span style="font-size:10px;color:#888;margin-left:4px">${p.stage}/${ms}</span></div></div>`;
if(lwLabel)h+=`<div style="font-size:12px;color:#999;margin-top:6px;padding-left:60px">${lwLabel}</div>`;
if(todayLogs.length)h+=`<div style="font-size:11px;color:#1565c0;margin-top:4px;padding-left:60px">오늘: ${todayLogs.map(l=>{const fm=FAM.find(f=>f.name===l.by);return(fm?.emoji||'')+' '+l.by;}).join(', ')}</div>`;}
h+=`</div>`;

if(isSel&&db){h+=`<div style="background:white;border-radius:0 0 16px 16px;padding:16px 18px;margin-top:-8px;border-left:2px solid ${c.bd};border-right:2px solid ${c.bd};border-bottom:2px solid ${c.bd}">`;
h+=`<div style="background:linear-gradient(135deg,#e8f5e9,#f1f8e9);border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid #c8e6c9"><div style="font-size:14px;font-weight:700;color:#2e7d32;margin-bottom:8px">${si.i} ${si.t}</div>${si.k.map(t=>`<div style="font-size:13px;color:#555;padding:3px 0 3px 8px;border-left:2px solid #81c784;margin-bottom:4px">${t}</div>`).join('')}</div>`;
h+=`<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">`;for(let i=0;i<ms;i++){const stg=i+1;const act=stg===p.stage;const sd=STAGES.find(s=>s.id===stg);h+=`<button onclick="event.stopPropagation();doSetStage('${p.id}',${stg})" style="flex:1;min-width:50px;padding:8px 4px;background:${act?'linear-gradient(135deg,#2e7d32,#43a047)':'#f5f5f5'};color:${act?'white':'#666'};border:${act?'none':'1px solid #e0e0e0'};border-radius:10px;font-size:11px;font-weight:${act?700:400};cursor:pointer;text-align:center"><div style="font-size:16px">${sd?.icon}</div><div>${sd?.name}</div></button>`;}h+=`</div>`;
h+=`<div style="font-size:13px;color:#555;line-height:1.8"><div>☀️ ${db.light}</div><div>🌡️ ${db.temp}</div><div>💧 ${SEASONS[season].label}: <b>${db.wi[season]}일</b>마다</div><div>🌿 ${db.soil}</div></div>`;
const wBtn=iWatered?`✓ ${A.user} 물 줬어요`:p.stage<=2?'💦 분무기로 물 주기':'💧 오늘 물 주기';
h+=`<div style="display:flex;gap:8px;margin-top:14px"><button onclick="event.stopPropagation();${iWatered?'':`doWater('${p.id}','${todayStr}')`}" ${iWatered?'disabled':''} style="flex:1;padding:10px 0;background:${iWatered?'#90caf9':'linear-gradient(135deg,#1565c0,#1976d2)'};color:white;border:none;border-radius:12px;font-weight:700;font-size:14px;cursor:${iWatered?'default':'pointer'};opacity:${iWatered?.7:1}">${wBtn}</button>`;
if(p.stage<ms){const nx=STAGES.find(s=>s.id===p.stage+1);h+=`<button onclick="event.stopPropagation();doSetStage('${p.id}',${p.stage+1})" style="padding:10px 14px;background:linear-gradient(135deg,#ff8f00,#ffa000);color:white;border:none;border-radius:12px;font-weight:700;font-size:13px;cursor:pointer">${nx?.icon} 다음</button>`;}
h+=`<button onclick="event.stopPropagation();doRemove('${p.id}')" style="padding:10px 14px;background:#ffebee;color:#c62828;border:none;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer">🗑️</button></div></div>`;}
h+=`</div>`;});return h;}

function rAdd(){
const q=A.addQ.toLowerCase();const filtered=Object.keys(DB).filter(n=>n.toLowerCase().includes(q)||DB[n].cat.includes(q));
let h=`<div style="font-size:20px;font-weight:900;color:#333;margin-bottom:16px">식물 추가하기</div>`;
h+=`<div style="background:white;border-radius:14px;padding:14px 16px;margin-bottom:16px;border:1px solid #e0e0e0"><div style="font-size:13px;font-weight:700;color:#555;margin-bottom:10px">시작 상태</div><div style="display:flex;gap:6px">`;
STAGES.forEach(st=>{const act=A.addStage===st.id;h+=`<button onclick="A.addStage=${st.id};render()" style="flex:1;padding:8px 4px;background:${act?'linear-gradient(135deg,#2e7d32,#43a047)':'#f5f5f5'};color:${act?'white':'#666'};border:${act?'none':'1px solid #e0e0e0'};border-radius:10px;font-size:11px;font-weight:${act?700:400};cursor:pointer;text-align:center"><div style="font-size:16px">${st.icon}</div><div>${st.name}</div></button>`;});h+=`</div></div>`;
h+=`<input id="add-search" type="text" placeholder="🔍 식물 이름 검색..." value="${A.addQ}" oninput="A.addQ=this.value;updateAddGrid()" style="width:100%;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;font-size:14px;margin-bottom:16px;box-sizing:border-box;outline:none"/>`;
if(A.addSel.length){h+=`<div style="background:#e8f5e9;border-radius:14px;padding:12px 16px;margin-bottom:16px;border:1px solid #a5d6a7"><div style="font-size:13px;font-weight:700;color:#2e7d32;margin-bottom:8px">선택됨 (${A.addSel.length}개)</div><div style="display:flex;flex-wrap:wrap;gap:6px">`;
A.addSel.forEach((item,i)=>{h+=`<span onclick="A.addSel.splice(${i},1);render()" style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:white;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid #c8e6c9">${DB[item.name]?.emoji} ${item.nick||item.name} ${STAGES.find(s=>s.id===item.stage)?.icon} ✕</span>`;});
h+=`</div><button onclick="doAddMulti()" style="width:100%;margin-top:12px;padding:12px 0;background:linear-gradient(135deg,#2e7d32,#43a047);color:white;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer">🌱 ${A.addSel.length}개 등록하기</button></div>`;}
if(A.addEditing){const edb=DB[A.addEditing];h+=`<div style="background:white;border-radius:16px;padding:18px;border:2px solid #43a047;margin-bottom:16px"><div style="font-size:15px;font-weight:700;margin-bottom:10px">${edb?.emoji} ${A.addEditing} — 별명</div><input id="nick-input" type="text" placeholder="별명 (예: 거실 토마토)" value="${A.addNick}" oninput="A.addNick=this.value" onkeydown="if(event.key==='Enter'){A.addSel.push({name:A.addEditing,nick:A.addNick,stage:A.addStage});A.addEditing=null;A.addNick='';render()}" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid #ddd;font-size:14px;margin-bottom:12px;box-sizing:border-box;outline:none"/><div style="display:flex;gap:8px"><button onclick="A.addSel.push({name:A.addEditing,nick:A.addNick,stage:A.addStage});A.addEditing=null;A.addNick='';render()" style="flex:1;padding:10px 0;background:linear-gradient(135deg,#2e7d32,#43a047);color:white;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer">확인</button><button onclick="A.addEditing=null;A.addNick='';render()" style="padding:10px 14px;background:#f5f5f5;border:1px solid #ddd;border-radius:10px;font-size:14px;cursor:pointer;color:#666">취소</button></div></div>`;}
h+=`<div id="add-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">`;
filtered.forEach(name=>{const db=DB[name];const cnt=A.addSel.filter(s=>s.name===name).length;h+=`<div style="position:relative"><div onclick="A.addSel.push({name:'${name}',nick:'',stage:A.addStage});render()" style="background:${cnt>0?'linear-gradient(135deg,#e8f5e9,#c8e6c9)':'white'};border-radius:14px;padding:14px;border:${cnt>0?'2px solid #43a047':'2px solid #eee'};cursor:pointer;text-align:center"><div style="font-size:32px;margin-bottom:6px">${db.emoji}</div><div style="font-size:14px;font-weight:700;color:#333">${name}</div><div style="font-size:11px;color:#888;margin-top:2px">${db.cat}</div>${cnt>0?`<div style="font-size:10px;color:#2e7d32;margin-top:4px;font-weight:700">✓ ${cnt}개</div>`:''}</div><button onclick="event.stopPropagation();A.addEditing='${name}';A.addNick='';render();requestAnimationFrame(()=>{document.getElementById('nick-input')?.focus()})" style="position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:12px;background:rgba(46,125,50,0.1);border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:#2e7d32">+</button></div>`;});
h+=`</div><div style="font-size:12px;color:#999;text-align:center;padding:8px 0">탭하면 추가, +로 별명 붙여 추가</div>`;return h;}

function rCal(){
const vd=A.cd;const yr=vd.getFullYear(),mo=vd.getMonth();const fd=new Date(yr,mo,1).getDay();const dim=new Date(yr,mo+1,0).getDate();
let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><button onclick="A.cd=new Date(${yr},${mo-1},1);A.sd=null;render()" style="background:none;border:none;font-size:22px;cursor:pointer">◀</button><div style="font-size:20px;font-weight:900;color:#333">${yr}년 ${mo+1}월</div><button onclick="A.cd=new Date(${yr},${mo+1},1);A.sd=null;render()" style="background:none;border:none;font-size:22px;cursor:pointer">▶</button></div>`;
h+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">${['일','월','화','수','목','금','토'].map((d,i)=>`<div style="text-align:center;font-size:12px;font-weight:700;color:${i===0?'#c62828':i===6?'#1565c0':'#888'};padding:6px 0">${d}</div>`).join('')}</div>`;
h+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">`;for(let i=0;i<fd;i++)h+=`<div></div>`;
for(let d=1;d<=dim;d++){const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const isT=ds===todayStr;const isS=A.sd===d;const ev=gEvts(yr,mo,d);const hw=ev.some(e=>e.t==='w');const hp=ev.some(e=>e.t==='p');const dow=(fd+d-1)%7;const clr=isT?'white':dow===0?'#c62828':dow===6?'#1565c0':'#333';
h+=`<div onclick="A.sd=A.sd===${d}?null:${d};render()" style="aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:${isT?'linear-gradient(135deg,#2e7d32,#43a047)':isS?'#e8f5e9':'white'};border:${isS?'2px solid #43a047':'1px solid #f0f0f0'}"><span style="font-size:13px;font-weight:${isT?700:400};color:${clr}">${d}</span><div style="display:flex;gap:2px;margin-top:2px;font-size:8px">${hw?'💧':''}${hp&&!hw?'⏰':''}</div></div>`;}
h+=`</div>`;
if(A.sd){const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(A.sd).padStart(2,'0')}`;const ev=gEvts(yr,mo,A.sd);
h+=`<div style="background:white;border-radius:16px;padding:16px;margin-top:12px;border:1px solid #e0e0e0"><div style="font-size:15px;font-weight:700;margin-bottom:10px">${mo+1}월 ${A.sd}일</div>`;
if(!ev.length)h+=`<div style="font-size:13px;color:#999">기록이 없어요</div>`;
else ev.forEach(e=>{const db=DB[e.p.name];h+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0"><span style="font-size:20px">${db?.emoji||'🌱'}</span><div style="flex:1"><div style="font-size:13px">${e.p.nick||e.p.name}</div>${e.t==='w'&&e.by?`<div style="font-size:11px;color:#1565c0">${e.by.map(b=>{const fm=FAM.find(f=>f.name===b);return(fm?.emoji||'')+' '+b;}).join(', ')}</div>`:''}</div><span style="font-size:11px;padding:3px 8px;border-radius:8px;background:${e.t==='w'?'#e3f2fd':'#fff3e0'};color:${e.t==='w'?'#1565c0':'#e65100'}">${e.t==='w'?'💧 물 줌':'⏰ 예정'}</span></div>`;});
if(A.plants.length){h+=`<div style="margin-top:12px"><div style="font-size:12px;color:#888;margin-bottom:6px">물 주기 기록:</div><div style="display:flex;flex-wrap:wrap;gap:6px">`;
A.plants.forEach(p=>{const db=DB[p.name];const myLog=(A.wl[p.id]||[]).some(l=>l.date===ds&&l.by===A.user);h+=`<button onclick="${myLog?`doUnwater('${p.id}','${ds}')`:`doWater('${p.id}','${ds}')`}" style="padding:6px 10px;border-radius:8px;border:${myLog?'2px solid #1565c0':'1px solid #ddd'};background:${myLog?'#e3f2fd':'white'};font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px">${db?.emoji} ${p.nick||p.name}${myLog?' ✓':''}</button>`;});
h+=`</div></div>`;}h+=`</div>`;}
h+=`<div style="display:flex;gap:16px;justify-content:center;margin-top:16px;font-size:12px;color:#888"><span>💧 물 준 날</span><span>⏰ 예정일</span></div>`;return h;}

function gEvts(yr,mo,day){const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;const dateObj=new Date(yr,mo,day);const evts=[];
A.plants.forEach(p=>{const logs=A.wl[p.id]||[];const dayLogs=logs.filter(l=>l.date===ds);if(dayLogs.length)evts.push({t:'w',p,by:dayLogs.map(l=>l.by)});});
if(dateObj>=today){A.plants.forEach(p=>{const db=DB[p.name];if(!db)return;const iv=db.wi[gS(mo+1)];const dates=getWDates(p.id);if(!dates.length)return;const d=ddf(prs(dates[dates.length-1]),dateObj);if(d>0&&d%iv===0)evts.push({t:'p',p});});}return evts;}

function rGuide(){
let h=`<div style="font-size:20px;font-weight:900;color:#333;margin-bottom:4px">식물 도감</div><div style="font-size:13px;color:#888;margin-bottom:16px">${SEASONS[season].label} 기준</div>`;
Object.entries(DB).forEach(([name,db])=>{const o=A.gSel===name;const ms=maxStg(name);
h+=`<div style="margin-bottom:8px"><div onclick="A.gSel=A.gSel==='${name}'?null:'${name}';render()" style="background:white;border-radius:${o?'14px 14px 0 0':'14px'};padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid #eee"><span style="font-size:28px">${db.emoji}</span><div style="flex:1"><div style="font-size:15px;font-weight:700">${name}</div><div style="font-size:12px;color:#888">${db.cat} · ${db.diff}</div></div><span style="font-size:12px;color:#aaa">${o?'▲':'▼'}</span></div>`;
if(o){h+=`<div style="background:#fafafa;border-radius:0 0 14px 14px;padding:16px;border:1px solid #eee;border-top:none;font-size:13px;color:#555;line-height:2"><div>☀️ ${db.light}</div><div>🌡️ ${db.temp}</div><div>💧 물: ${Object.entries(SEASONS).map(([k,s])=>`<span style="display:inline-block;padding:2px 8px;border-radius:6px;margin:2px 3px;font-size:11px;background:${k===season?'#e8f5e9':'#f5f5f5'};font-weight:${k===season?700:400};border:${k===season?'1px solid #81c784':'1px solid #e0e0e0'}">${s.label} ${db.wi[k]}일</span>`).join('')}</div><div>💧 ${db.wn}</div><div>🌿 ${db.soil}</div>`;
h+=`<div style="margin-top:12px;background:white;border-radius:12px;padding:14px;border:1px solid #e0e0e0"><div style="font-size:14px;font-weight:700;color:#2e7d32;margin-bottom:10px">📋 성장 단계별 관리</div>`;
for(let i=0;i<ms;i++){const stg=i+1;const tips=stTip(name,stg);h+=`<div style="padding:8px 0;border-bottom:${stg<ms?'1px solid #f0f0f0':'none'}"><div style="font-size:13px;font-weight:700;margin-bottom:4px">${tips.i} ${tips.t}</div>${tips.k.map(t=>`<div style="font-size:12px;color:#666;padding-left:8px;border-left:2px solid #c8e6c9;margin-bottom:3px">${t}</div>`).join('')}</div>`;}
h+=`</div><div style="margin-top:8px;padding:10px 12px;background:#fff8e1;border-radius:10px;border:1px solid #ffe082">💡 ${db.tips}</div></div>`;}h+=`</div>`;});return h;}

// Init
render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').then(r=>{r.update();r.addEventListener('updatefound',()=>{const w=r.installing;w.addEventListener('statechange',()=>{if(w.state==='activated')location.reload();});});}).catch(()=>{});}
</script>
