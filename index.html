  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(165deg,#f0f7ec 0%,#e8f5e9 30%,#fff8e1 100%);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:80px;position:relative}

    .pgi-e{font-size:32px;margin-bottom:6px}.pgi-n{font-size:14px;font-weight:700;color:#333}.pgi-c{font-size:11px;color:#888;margin-top:2px}

    .cer{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0}
    .cer:last-child{border-bottom:none}
    .ceb{font-size:11px;padding:3px 8px;border-radius:8px}
    .cwbs{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
    .cwb{padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;border:1px solid #ddd;background:#fff}
    .cwb.chk{border:2px solid #1565c0;background:#e3f2fd}

    .gi{margin-bottom:8px}
    .gh{background:#fff;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid #eee}
    .gh.open{border-radius:14px 14px 0 0}
    .gb{background:#fafafa;border-radius:0 0 14px 14px;padding:16px;border:1px solid #eee;border-top:none;font-size:13px;color:#555;line-height:2}
    .stag{display:inline-block;padding:2px 8px;border-radius:6px;margin:2px 3px;font-size:11px;background:#f5f5f5;border:1px solid #e0e0e0}
    .stag.cur{background:#e8f5e9;font-weight:700;border-color:#81c784}
    .gtip{margin-top:8px;padding:10px 12px;background:#fff8e1;border-radius:10px;border:1px solid #ffe082}
    .empty{text-align:center;padding:60px 20px;color:#888}
    .empty-ic{font-size:64px;margin-bottom:16px}
    .empty-t{font-size:18px;font-weight:700;color:#555;margin-bottom:8px}
    .loading{text-align:center;padding:60px 20px;color:#888}
    .spinner{display:inline-block;width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:#43a047;border-radius:50%;animation:sp .8s linear infinite;margin-bottom:12px}
    @keyframes sp{to{transform:rotate(360deg)}}

<body>
<div id="app"></div>
<script>
const SUPA='https://azkyveftbxrmfytszddz.supabase.co/rest/v1';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6a3l2ZWZ0YnhybWZ5dHN6ZGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTg2NzMsImV4cCI6MjA5MDA3NDY3M30.NkCPIe20Vwjnaf5eRsNnTrtGn6IBV4pXW-mUhWLUhAY';
const H={apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json',Prefer:'return=representation'};
const FAMILY_PASSWORD='8816';

async function fetchP(){const r=await fetch(`${SUPA}/plants?select=*&order=created_at.asc`,{headers:H});return r.json();}
async function fetchW(){const r=await fetch(`${SUPA}/water_logs?select=*&order=watered_date.asc`,{headers:H});return r.json();}
async function apiAddP(name,nick){const r=await fetch(`${SUPA}/plants`,{method:'POST',headers:H,body:JSON.stringify({name,nickname:nick||''})});return r.json();}
async function apiDelP(id){await fetch(`${SUPA}/plants?id=eq.${id}`,{method:'DELETE',headers:H});}
async function apiAddW(pid,date){await fetch(`${SUPA}/water_logs`,{method:'POST',headers:{...H,Prefer:'return=representation,resolution=merge-duplicates'},body:JSON.stringify({plant_id:pid,watered_date:date})});}
async function apiDelW(pid,date){await fetch(`${SUPA}/water_logs?plant_id=eq.${pid}&watered_date=eq.${date}`,{method:'DELETE',headers:H});}

const DB={
  "방울토마토":{emoji:"🍅",cat:"열매채소",light:"직사광선 6시간+",diff:"보통",wi:{spring:3,summer:2,fall:3,winter:5},soil:"배양토 7 + 펄라이트 3",tips:"열매 맺히면 물을 살짝 줄이면 당도가 올라요. 곁순 제거 필수!",wn:"흠뻑 주고 받침 물 버리기",temp:"20~30°C"},
  "해바라기":{emoji:"🌻",cat:"꽃",light:"직사광선 6시간+",diff:"쉬움",wi:{spring:3,summer:2,fall:3,winter:4},soil:"배양토 7 + 펄라이트 2 + 상토 1",tips:"왜소종(미니)이 실내에 적합해요. 화분 15L 이상 권장.",wn:"흠뻑 주기",temp:"18~30°C"},
  "사루비아":{emoji:"🌺",cat:"꽃",light:"양지~반양지",diff:"보통",wi:{spring:4,summer:3,fall:4,winter:6},soil:"배양토 5 + 펄라이트 3 + 상토 2",tips:"과습에 약해요. 통풍이 중요하고 환기를 자주 해주세요.",wn:"겉흙이 확실히 마른 뒤 흠뻑",temp:"15~25°C"},
  "라벤더":{emoji:"💜",cat:"허브",light:"직사광선 6시간+",diff:"보통",wi:{spring:6,summer:4,fall:6,winter:10},soil:"배양토 4 + 펄라이트 4 + 상토 2",tips:"지중해 식물이라 건조하게! 펄라이트를 아끼지 마세요.",wn:"겉흙 마른 뒤 하루 더 기다렸다가 흠뻑",temp:"15~25°C"},
  "다육이":{emoji:"🪴",cat:"다육식물",light:"밝은 간접광~직사광선",diff:"쉬움",wi:{spring:14,summer:10,fall:14,winter:21},soil:"배양토 3 + 펄라이트 5 + 상토 2",tips:"잎이 말랑해지면 물 줄 타이밍. 과습이 최대 적!",wn:"흠뻑 주되 받침 물 즉시 제거",temp:"10~30°C"},
  "바질":{emoji:"🌿",cat:"허브",light:"직사광선 6시간+",diff:"쉬움",wi:{spring:2,summer:1,fall:3,winter:4},soil:"배양토 6 + 펄라이트 2 + 상토 2",tips:"꽃대가 올라오면 바로 잘라주세요. 수확할수록 풍성해져요.",wn:"흙이 마르면 바로 흠뻑",temp:"20~30°C"},
  "로즈마리":{emoji:"🌱",cat:"허브",light:"직사광선 5시간+",diff:"보통",wi:{spring:5,summer:3,fall:5,winter:8},soil:"배양토 4 + 펄라이트 4 + 상토 2",tips:"라벤더와 비슷하게 건조하게 관리. 과습 시 잎이 갈변해요.",wn:"겉흙 완전히 마른 뒤 흠뻑",temp:"10~28°C"},
  "고추":{emoji:"🌶️",cat:"열매채소",light:"직사광선 6시간+",diff:"보통",wi:{spring:3,summer:2,fall:3,winter:5},soil:"배양토 7 + 펄라이트 2 + 상토 1",tips:"방울토마토와 비슷한 관리. 첫 꽃은 따주면 이후 열매가 많아져요.",wn:"흠뻑 주고 받침 물 버리기",temp:"20~30°C"},
  "상추":{emoji:"🥬",cat:"잎채소",light:"반양지~양지",diff:"쉬움",wi:{spring:2,summer:1,fall:2,winter:3},soil:"배양토 6 + 상토 3 + 펄라이트 1",tips:"겉잎부터 따서 먹으면 오래 수확 가능. 반그늘도 OK.",wn:"흙이 마르지 않도록 자주 체크",temp:"15~25°C"},
  "스투키":{emoji:"🌵",cat:"관엽식물",light:"밝은 간접광",diff:"매우 쉬움",wi:{spring:21,summer:14,fall:21,winter:30},soil:"배양토 3 + 펄라이트 5 + 상토 2",tips:"물을 거의 안 줘도 됩니다. 공기정화 능력 우수!",wn:"한 달에 한 번 정도, 완전히 말린 뒤",temp:"15~30°C"},
  "몬스테라":{emoji:"🌿",cat:"관엽식물",light:"밝은 간접광",diff:"쉬움",wi:{spring:5,summer:3,fall:5,winter:8},soil:"배양토 5 + 펄라이트 3 + 상토 2",tips:"잎에 구멍이 뚫리려면 충분한 빛이 필요해요. 지지대 필수.",wn:"겉흙 2cm 마르면 흠뻑",temp:"18~30°C"},
  "딸기":{emoji:"🍓",cat:"열매채소",light:"직사광선 6시간+",diff:"보통",wi:{spring:2,summer:1,fall:3,winter:5},soil:"배양토 6 + 펄라이트 3 + 상토 1",tips:"런너(줄기)를 잘라줘야 열매에 영양이 집중돼요.",wn:"흙이 마르기 전에 흠뻑, 열매에 물 안 닿게",temp:"15~25°C"},
  "데이지":{emoji:"🌼",cat:"꽃",light:"직사광선 4~6시간",diff:"쉬움",wi:{spring:3,summer:2,fall:3,winter:5},soil:"배양토 6 + 펄라이트 3 + 상토 1",tips:"시든 꽃은 바로 따주면 계속 새 꽃이 올라와요. 서늘한 환경을 좋아해요.",wn:"겉흙이 마르면 흠뻑, 꽃잎에 물 안 닿게",temp:"10~20°C"},
};
const SEASONS={spring:{label:"봄",months:[3,4,5]},summer:{label:"여름",months:[6,7,8]},fall:{label:"가을",months:[9,10,11]},winter:{label:"겨울",months:[12,1,2]}};
function getSeason(m){for(const[k,v]of Object.entries(SEASONS))if(v.months.includes(m))return k;return'spring';}
function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function prs(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function ddf(a,b){return Math.round((b-a)/864e5);}

const A={loggedIn:false,plants:[],wl:{},tab:'home',sel:null,sd:null,cd:null,addSel:null,addNick:'',addQ:'',gSel:null,loading:true,online:true};
const today=new Date();const todayStr=fmt(today);const season=getSeason(today.getMonth()+1);
A.cd=new Date(today.getFullYear(),today.getMonth(),1);

let pollId=null;

async function loadAll(){
  try{
    const[pd,wd]=await Promise.all([fetchP(),fetchW()]);
    A.plants=(pd||[]).map(p=>({id:p.id,name:p.name,nick:p.nickname||'',added:p.added_date}));
    A.wl={};(wd||[]).forEach(l=>{if(!A.wl[l.plant_id])A.wl[l.plant_id]=[];A.wl[l.plant_id].push(l.watered_date);});
    A.online=true;
  }catch(e){A.online=false;console.error(e);}
  A.loading=false;render();
}

function getStatus(p){
  const db=DB[p.name];if(!db)return{s:'unknown',d:0};
  const iv=db.wi[season];const logs=A.wl[p.id]||[];
  if(!logs.length)return{s:'need',d:0};
  const left=iv-ddf(prs(logs[logs.length-1]),today);
  if(left<=0)return{s:'need',d:0};if(left<=1)return{s:'soon',d:left};return{s:'ok',d:left};
}
function sc(ws){
  if(ws.s==='need')return{bg:'#ffebee',bd:'#ef9a9a',badge:'🔴 물 주세요!',bc:'#c62828'};
  if(ws.s==='soon')return{bg:'#fff8e1',bd:'#ffe082',badge:'🟡 내일 물 주기',bc:'#f57f17'};
  if(ws.s==='ok')return{bg:'#e8f5e9',bd:'#a5d6a7',badge:`🟢 ${ws.d}일 후`,bc:'#2e7d32'};
  return{bg:'#f5f5f5',bd:'#e0e0e0',badge:'❓',bc:'#757575'};
}

function switchTab(t){A.tab=t;A.sel=null;A.sd=null;A.addSel=null;A.addNick='';A.addQ='';render();}
function doLogin(){
  const pw=document.getElementById('pw-input')?.value||'';
  if(pw===FAMILY_PASSWORD){A.loggedIn=true;sessionStorage.setItem('garden_auth','true');A.loading=true;render();loadAll();pollId=setInterval(loadAll,5000);}
  else{const e=document.getElementById('login-err');if(e)e.textContent='비밀번호가 틀렸어요 🥲';}
}
async function doAddPlant(){
  if(!A.addSel)return;
  const d=await apiAddP(A.addSel,A.addNick);
  if(d?.[0])A.plants.push({id:d[0].id,name:d[0].name,nick:d[0].nickname||'',added:d[0].added_date});
  A.addSel=null;A.addNick='';A.tab='home';render();
}
async function doRemove(id){
  if(!confirm('정말 삭제할까요?'))return;
  await apiDelP(id);A.plants=A.plants.filter(p=>p.id!==id);delete A.wl[id];A.sel=null;render();
}
async function doWater(pid,date){
  await apiAddW(pid,date);if(!A.wl[pid])A.wl[pid]=[];if(!A.wl[pid].includes(date)){A.wl[pid].push(date);A.wl[pid].sort();}render();
}
async function doUnwater(pid,date){
  await apiDelW(pid,date);if(A.wl[pid])A.wl[pid]=A.wl[pid].filter(d=>d!==date);render();
}

function render(){
  const el=document.getElementById('app');
  if(!A.loggedIn){el.innerHTML=renderLogin();return;}
  if(A.loading){el.innerHTML=renderHeader()+`<div class="loading"><div class="spinner"></div><div>불러오는 중...</div></div>`;return;}
  let content='';
  switch(A.tab){case'home':content=renderHome();break;case'add':content=renderAdd();break;case'calendar':content=renderCal();break;case'guide':content=renderGuide();break;}
  el.innerHTML=renderHeader()+`<div class="ct">${content}</div>`+renderNav();
}

function renderLogin(){
  return`<div class="login"><div class="logo">🌱</div><h1>우리 가족 정원</h1><p>가족 비밀번호를 입력하세요</p><input type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"/><button onclick="doLogin()">입장하기</button><div id="login-err" class="login-err"></div></div>`;
}
function renderHeader(){
  return`<div class="hdr"><div class="hdr-date">${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 · ${SEASONS[season].label}</div><div class="hdr-title">🌱 우리 가족 정원</div><div class="hdr-sub"><span>식물 ${A.plants.length}그루 관리 중</span><span class="sync"><span class="dot ${A.online?'':'off'}"></span>${A.online?'실시간 동기화':'오프라인'}</span></div></div>`;
}
function renderNav(){
  const tabs=[{id:'home',ic:'🏡',l:'내 정원'},{id:'add',ic:'➕',l:'추가'},{id:'calendar',ic:'📅',l:'캘린더'},{id:'guide',ic:'📖',l:'식물도감'}];
  return`<div class="bnav">${tabs.map(t=>`<button class="nb ${A.tab===t.id?'on':''}" onclick="switchTab('${t.id}')"><span class="ic">${t.ic}</span><span class="lb">${t.l}</span></button>`).join('')}</div>`;
}

function renderHome(){
  if(!A.plants.length)return`<div class="empty"><div class="empty-ic">🌱</div><div class="empty-t">아직 식물이 없어요</div><div style="font-size:14px">아래 [추가] 탭에서 식물을 등록해보세요!</div></div>`;
  const sorted=[...A.plants].sort((a,b)=>{const o={need:0,soon:1,ok:2,unknown:3};return(o[getStatus(a).s]??3)-(o[getStatus(b).s]??3);});
  const need=sorted.filter(p=>getStatus(p).s==='need');
  let h='';
  if(need.length)h+=`<div class="alert"><div class="alert-t">💧 물 줄 시간이에요!</div><div class="alert-b">${need.map(p=>`${DB[p.name]?.emoji||'🌱'} ${p.nick||p.name}`).join(', ')}</div></div>`;
  sorted.forEach(p=>{
    const db=DB[p.name];const ws=getStatus(p);const c=sc(ws);const isSel=A.sel===p.id;const logs=A.wl[p.id]||[];const last=logs.length?logs[logs.length-1]:null;
    h+=`<div class="card ${isSel?'sel':''}" style="border:2px solid ${c.bd}" onclick="A.sel=A.sel==='${p.id}'?null:'${p.id}';render();">
      <div class="card-row"><div class="card-ic" style="background:${c.bg}">${db?.emoji||'🌱'}</div><div class="card-info"><div class="card-name">${p.nick||p.name}</div><div class="card-sub">${p.name} · ${db?.cat||'식물'}</div></div><div class="badge" style="color:${c.bc};background:${c.bg}">${c.badge}</div></div>
      ${last?`<div class="card-last">마지막 물 준 날: ${last}</div>`:''}
    </div>`;
    if(isSel&&db){
      h+=`<div class="detail" style="border-left:2px solid ${c.bd};border-right:2px solid ${c.bd};border-bottom:2px solid ${c.bd}">
        <div class="detail-info"><div>☀️ 빛: ${db.light}</div><div>🌡️ 적정 온도: ${db.temp}</div><div>💧 물 주기(${SEASONS[season].label}): <b>${db.wi[season]}일</b>마다</div><div>🪴 흙 배합: ${db.soil}</div><div>💡 ${db.tips}</div></div>
        <div class="acts"><button class="bw" onclick="event.stopPropagation();doWater('${p.id}','${todayStr}')">💧 오늘 물 줬어요</button><button class="bd" onclick="event.stopPropagation();doRemove('${p.id}')">🗑️</button></div>
      </div>`;
    }
  });
  return h;
}

function renderAdd(){
  const q=A.addQ.toLowerCase();
  const filtered=Object.keys(DB).filter(n=>n.toLowerCase().includes(q)||DB[n].cat.includes(q));
  let h=`<div class="stitle">식물 추가하기</div><input class="sinput" type="text" placeholder="🔍 식물 이름 검색..." value="${A.addQ}" oninput="A.addQ=this.value;render()"/>`;
  h+=`<div class="pgrid">`;
  filtered.forEach(name=>{
    const db=DB[name];const added=A.plants.some(p=>p.name===name);const isSel=A.addSel===name;
    h+=`<div class="pgi ${isSel?'sel':''} ${added?'dis':''}" onclick="${added?'':`A.addSel='${name}';render();`}"><div class="pgi-e">${db.emoji}</div><div class="pgi-n">${name}</div><div class="pgi-c">${db.cat}</div>${added?'<div style="font-size:10px;color:#999;margin-top:4px">등록됨 ✓</div>':''}</div>`;
  });
  h+=`</div>`;
  if(A.addSel){
    const db=DB[A.addSel];
    h+=`<div class="aform"><div style="font-size:15px;font-weight:700;margin-bottom:10px">${db.emoji} ${A.addSel}</div><input type="text" placeholder="별명 (예: 거실 토마토) - 선택사항" id="nick-input" value="${A.addNick}" oninput="A.addNick=this.value"/><button class="badd" onclick="doAddPlant()">🌱 등록하기</button></div>`;
  }
  return h;
}

function renderCal(){
  const vd=A.cd;const yr=vd.getFullYear(),mo=vd.getMonth();
  const fd=new Date(yr,mo,1).getDay();const dim=new Date(yr,mo+1,0).getDate();
  let h=`<div class="cnav"><button onclick="A.cd=new Date(${yr},${mo-1},1);A.sd=null;render()">◀</button><div class="ct2">${yr}년 ${mo+1}월</div><button onclick="A.cd=new Date(${yr},${mo+1},1);A.sd=null;render()">▶</button></div>`;
  h+=`<div class="chdr">${['일','월','화','수','목','금','토'].map((d,i)=>`<div style="color:${i===0?'#c62828':i===6?'#1565c0':'#888'}">${d}</div>`).join('')}</div>`;
  h+=`<div class="cgrid">`;
  for(let i=0;i<fd;i++)h+=`<div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===todayStr;const isS=A.sd===d;
    const evts=getEvts(yr,mo,d);const hw=evts.some(e=>e.t==='watered');const hp=evts.some(e=>e.t==='predicted');
    const dow=(fd+d-1)%7;const clr=isT?'white':dow===0?'#c62828':dow===6?'#1565c0':'#333';
    let cls='cday';if(isT)cls+=' tod';else if(isS)cls+=' csel';
    h+=`<div class="${cls}" onclick="A.sd=A.sd===${d}?null:${d};render()"><span style="color:${clr}">${d}</span><div class="cevt">${hw?'💧':''}${hp&&!hw?'⏰':''}</div></div>`;
  }
  h+=`</div>`;
  if(A.sd){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(A.sd).padStart(2,'0')}`;const evts=getEvts(yr,mo,A.sd);
    h+=`<div class="cdtl"><div class="cdtl-t">${mo+1}월 ${A.sd}일</div>`;
    if(!evts.length)h+=`<div style="font-size:13px;color:#999">기록이 없어요</div>`;
    else evts.forEach(e=>{const db=DB[e.p.name];h+=`<div class="cer"><span style="font-size:20px">${db?.emoji||'🌱'}</span><span style="flex:1;font-size:13px">${e.p.nick||e.p.name}</span><span class="ceb" style="background:${e.t==='watered'?'#e3f2fd':'#fff3e0'};color:${e.t==='watered'?'#1565c0':'#e65100'}">${e.t==='watered'?'💧 물 줌':'⏰ 물 줄 예정'}</span></div>`;});
    if(A.plants.length){
      h+=`<div style="margin-top:12px"><div style="font-size:12px;color:#888;margin-bottom:6px">물 주기 기록:</div><div class="cwbs">`;
      A.plants.forEach(p=>{const db=DB[p.name];const isW=(A.wl[p.id]||[]).includes(ds);
        h+=`<button class="cwb ${isW?'chk':''}" onclick="${isW?`doUnwater('${p.id}','${ds}')`:`doWater('${p.id}','${ds}')`}">${db?.emoji||'🌱'} ${p.nick||p.name}${isW?' ✓':''}</button>`;
      });
      h+=`</div></div>`;
    }
    h+=`</div>`;
  }
  h+=`<div class="cleg"><span>💧 물 준 날</span><span>⏰ 예정일</span></div>`;
  return h;
}

function getEvts(yr,mo,day){
  const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;const dateObj=new Date(yr,mo,day);const evts=[];
  A.plants.forEach(p=>{if((A.wl[p.id]||[]).includes(ds))evts.push({t:'watered',p});});
  if(dateObj>=today){A.plants.forEach(p=>{const db=DB[p.name];if(!db)return;const iv=db.wi[getSeason(mo+1)];const logs=A.wl[p.id]||[];if(!logs.length)return;const d=ddf(prs(logs[logs.length-1]),dateObj);if(d>0&&d%iv===0)evts.push({t:'predicted',p});});}
  return evts;
}

function renderGuide(){
  let h=`<div class="stitle">식물 도감</div><div class="gsub">현재 계절: ${SEASONS[season].label} 기준 관리법</div>`;
  Object.entries(DB).forEach(([name,db])=>{
    const o=A.gSel===name;
    h+=`<div class="gi"><div class="gh ${o?'open':''}" onclick="A.gSel=A.gSel==='${name}'?null:'${name}';render()"><span style="font-size:28px">${db.emoji}</span><div style="flex:1"><div style="font-size:15px;font-weight:700">${name}</div><div style="font-size:12px;color:#888">${db.cat} · 난이도: ${db.diff}</div></div><span style="font-size:12px;color:#aaa">${o?'▲':'▼'}</span></div>`;
    if(o){
      h+=`<div class="gb"><div>☀️ <b>빛</b>: ${db.light}</div><div>🌡️ <b>적정 온도</b>: ${db.temp}</div><div>💧 <b>물 주기</b>: ${Object.entries(SEASONS).map(([k,s])=>`<span class="stag ${k===season?'cur':''}">${s.label} ${db.wi[k]}일</span>`).join('')}</div><div>💧 <b>물 주는 법</b>: ${db.wn}</div><div>🪴 <b>흙 배합</b>: ${db.soil}</div><div class="gtip">💡 <b>팁</b>: ${db.tips}</div></div>`;
    }
    h+=`</div>`;
  });
  return h;
}

// Init
if(sessionStorage.getItem('garden_auth')==='true'){A.loggedIn=true;render();loadAll();pollId=setInterval(loadAll,5000);}
else{A.loading=false;render();}

// Service Worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').then(r=>{r.update();r.addEventListener('updatefound',()=>{const w=r.installing;w.addEventListener('statechange',()=>{if(w.state==='activated')location.reload();});});}).catch(()=>{});}
</script>
